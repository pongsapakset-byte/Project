<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Dashboard | Sripatum Luxury</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(212, 175, 55, 0.3);
        }

        body { 
            background: var(--dark-bg); 
            color: #e0e0e0; 
            font-family: 'Prompt', sans-serif; 
            padding: 40px 0;
        }

        h2, .grand-total-label { font-family: 'Playfair Display', serif; }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border-radius: 30px;
            border: 1px solid var(--border);
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        .summary-card {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(0,0,0,0));
            border: 1px solid var(--gold);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            text-align: center;
        }

        /* --- จุดที่แก้: บังคับตารางให้มืดและตัวหนังสือเห็นชัด --- */
        .table-responsive {
            background: rgba(0, 0, 0, 0.6); 
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .table { 
            color: #ffffff !important; 
        }

        .table thead th { 
            border-bottom: 2px solid var(--gold) !important; 
            color: var(--gold) !important; 
            background: transparent !important;
        }

        .table tbody td {
            background: transparent !important;
            color: #ffffff !important;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1) !important;
        }

        /* เน้นชื่อลูกค้าเป็นสีทอง */
        .name-highlight {
            color: var(--gold) !important;
            font-weight: 600;
            font-size: 1.1rem;
            display: block;
        }

        .phone-highlight {
            color: #aaaaaa !important;
            font-size: 0.85rem;
        }

        .btn-action {
            border-radius: 8px;
            transition: 0.3s;
            font-size: 0.8rem;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            border: 1px solid var(--gold);
            color: var(--gold);
        }
    </style>
</head>

<body>
<div class="container">
    <div class="glass-panel">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-warning mb-0">Admin Management</h2>
            <a href="index.html" class="btn btn-outline-secondary btn-sm btn-action">View Website</a>
        </div>

        <div class="summary-card">
            <span class="grand-total-label text-uppercase small text-warning" style="letter-spacing: 3px;">Total Revenue</span>
            <h1 class="display-4 fw-bold text-white mt-2" id="grandTotal">0.-</h1>
            <p class="text-secondary mb-0 small">รายได้รวมทั้งหมดจากระบบการจอง</p>
        </div>

        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>Customer Details</th>
                        <th>Room Type</th>
                        <th>Stay</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody id="adminList"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDa3v6JYir-oiEC0ordGqtXpQLL6fJ7qjc",
        authDomain: "hotel-project-e3808.firebaseapp.com",
        projectId: "hotel-project-e3808"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(collection(db, "bookings"), (snap) => {
        const list = document.getElementById('adminList');
        const grandTotalElem = document.getElementById('grandTotal');
        let totalRevenue = 0;
        
        list.innerHTML = "";

        snap.forEach(row => {
            const data = row.data();
            const id = row.id;
            
            const displayName = data.guestName || data.name || "ไม่ระบุชื่อ";
            const displayPhone = data.guestPhone || data.phone || "-";
            const nights = data.nights || 0;
            const totalPrice = data.total || 0;
            
            totalRevenue += totalPrice;

            list.innerHTML += `
                <tr>
                    <td>
                        <span class="name-highlight">${displayName}</span>
                        <span class="phone-highlight"><i class="fas fa-phone me-1"></i> ${displayPhone}</span>
                    </td>
                    <td><span class="text-white">${data.room || 'Standard'}</span></td>
                    <td>${nights} คืน</td>
                    <td><span class="text-warning fw-bold">${totalPrice.toLocaleString()} .-</span></td>
                    <td><span class="status-badge">${data.status || 'รอดำเนินการ'}</span></td>
                    <td class="text-end">
                        <button onclick="updateStatus('${id}')" class="btn btn-sm btn-success btn-action me-2">Confirm</button>
                        <button onclick="deleteBooking('${id}')" class="btn btn-sm btn-outline-danger btn-action"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `;
        });
        
        grandTotalElem.innerText = totalRevenue.toLocaleString() + " .-";
    });

    window.updateStatus = async (id) => {
        try {
            await updateDoc(doc(db, "bookings", id), { status: "สำเร็จแล้ว" });
        } catch (e) { alert("Error: " + e.message); }
    };

    window.deleteBooking = async (id) => {
        if(confirm("คุณแน่ใจใช่ไหมที่จะลบรายการจองนี้?")) {
            try {
                await deleteDoc(doc(db, "bookings", id));
            } catch (e) { alert("Error: " + e.message); }
        }
    };
</script>
</body>
</html>
