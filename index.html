<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sripatum Hotel System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
html{ scroll-behavior:smooth; }

body{
    background: linear-gradient(180deg,#0b0b0b,#050505);
    color:white;
    font-family:Segoe UI;
}

.navbar{
    background:rgba(0,0,0,0.85);
    backdrop-filter:blur(10px);
}

.hero{
    min-height:100vh;
    background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.9)),
    url('background.jpg') center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.hero h1{
    font-size:60px;
    color:gold;
}

.room-card{
    background:#111;
    border-radius:15px;
    cursor:pointer;
    transition:0.3s;
}
.room-card:hover{
    transform:translateY(-10px) scale(1.03);
    box-shadow:0 10px 30px rgba(255,215,0,0.4);
}

.btn-gold{
    background:linear-gradient(45deg,gold,orange);
    border:none;
    color:black;
    font-weight:bold;
}

.social-box{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.social-btn{
    display:flex;
    align-items:center;
    gap:10px;
    background:#f1f1f1;
    color:#333;
    padding:10px 18px;
    border-radius:25px;
    text-decoration:none;
}

.social-btn:hover{
    background:gold;
    color:black;
}
</style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark fixed-top navbar-expand-lg">
<div class="container-fluid">

<span class="navbar-brand text-warning">Sripatum Hotel</span>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse justify-content-end" id="menu">
<ul class="navbar-nav">
<li class="nav-item"><a class="nav-link text-light" href="#">Home</a></li>
<li class="nav-item"><a class="nav-link text-light" href="#booking">Booking</a></li>
<li class="nav-item"><a class="nav-link text-light" href="#contact">Contact</a></li>
</ul>

<button onclick="logout()" class="btn btn-outline-warning ms-3">Logout</button>

</div>
</div>
</nav>

<!-- Login -->
<div id="loginPage" style="position:fixed;width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;z-index:9999;">
<div style="background:#111;padding:30px;border-radius:15px;width:300px;text-align:center;">
<h3 class="text-warning">Login</h3>
<input id="user" class="form-control mb-2">
<input id="pass" type="password" class="form-control mb-3">
<button onclick="login()" class="btn btn-gold w-100">Login</button>
</div>
</div>

<!-- Hero -->
<section class="hero">
<div>
<h1>Hotel Booking</h1>
<a href="#booking" class="btn btn-gold mt-3">Start</a>
</div>
</section>

<!-- Booking -->
<section id="booking" class="container">

<h2 class="text-center text-warning mb-4">Select Room</h2>

<div class="row g-4">

<div class="col-md-4">
<div class="room-card p-2" onclick="selectRoom(event,500,'Standard')">
<img src="j2.jpg" class="img-fluid">
<h5 class="text-center">Standard</h5>
</div>
</div>

<div class="col-md-4">
<div class="room-card p-2" onclick="selectRoom(event,1000,'Deluxe')">
<img src="j3.jpg" class="img-fluid">
<h5 class="text-center">Deluxe</h5>
</div>
</div>

<div class="col-md-4">
<div class="room-card p-2" onclick="selectRoom(event,2000,'Suite')">
<img src="j4.jpg" class="img-fluid">
<h5 class="text-center">Suite</h5>
</div>
</div>

</div>

<div class="mt-4">
<input type="date" id="checkin" class="form-control mb-2">
<input type="date" id="checkout" class="form-control mb-2">
<button onclick="calculate()" class="btn btn-gold w-100">Confirm</button>
</div>

<h4 id="result" class="text-center mt-3"></h4>
<div id="alertBox" class="mt-3"></div>

</section>

<!-- Contact -->
<section id="contact" class="container">

<h2 class="text-center text-warning mb-5">Contact & Location</h2>

<div class="row g-4">

<div class="col-md-6">
<div style="background:#111;padding:25px;border-radius:15px;border:1px solid gold;">
<p>📧 Email: sripatum@email.com</p>
<p>📞 Phone: 039-969-9555</p>

<div class="social-box mt-3">
<a href="https://www.instagram.com/" target="_blank" class="social-btn">
<i class="fab fa-instagram"></i> Instagram
</a>
<a href="https://www.facebook.com/" target="_blank" class="social-btn">
<i class="fab fa-facebook"></i> Facebook
</a>
</div>

</div>
</div>

<div class="col-md-6">
<iframe 
src="https://www.google.com/maps?q=13.8554,100.5843&output=embed"
style="width:100%; height:350px; border-radius:15px;">
</iframe>
</div>

</div>

</section>

<!-- Footer -->
<footer style="text-align:center;padding:20px;">
<p>© 2026 Sripatum Hotel</p>
</footer>

<script>

function showAlert(msg,type){
    alertBox.innerHTML=`
    <div class="alert alert-${type} alert-dismissible fade show">
    ${msg}
    <button class="btn-close" data-bs-dismiss="alert"></button>
    </div>`;
}

function login(){
    if(user.value==="admin" && pass.value==="1234"){
        loginPage.style.display="none";
        showAlert("Login สำเร็จ","success");
    }else{
        showAlert("Login ไม่ถูกต้อง","danger");
    }
}

function logout(){
    loginPage.style.display="flex";
}

let price=0,room="";

function selectRoom(e,p,name){
    price=p;
    room=name;

    document.querySelectorAll(".room-card").forEach(c=>c.style.border="none");
    e.currentTarget.style.border="2px solid gold";

    result.innerHTML="เลือก: "+name;
}

function calculate(){
    let diff=(new Date(checkout.value)-new Date(checkin.value))/(1000*60*60*24);

    if(price==0) return showAlert("เลือกห้องก่อน","warning");
    if(diff<=0) return showAlert("วันไม่ถูกต้อง","danger");

    result.innerHTML=`${room} | ${diff} คืน | ${diff*price} บาท`;
    showAlert("Booking สำเร็จ","success");
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
